backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "worksheet_library"
    label: "Worksheet Library"
    files:
      - label: "Worksheets"
        name: "worksheets"
        file: "content/worksheets.json"
        fields:
          - label: "Worksheets"
            name: "worksheets"
            widget: "list"
            summary: "Lesson {{fields.lesson}} - {{fields.title}}"
            fields:
              - { label: "Lesson Number", name: "lesson", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Worksheet File", name: "file", widget: "string" }

  - name: "video_library"
    label: "Video Library"
    files:
      - label: "Videos"
        name: "videos"
        file: "content/videos.json"
        fields:
          - label: "Videos"
            name: "videos"
            widget: "list"
            summary: "Lesson {{fields.lesson}} - {{fields.title}}"
            fields:
              - { label: "Lesson Number", name: "lesson", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Video File", name: "video", widget: "file" }
              - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
