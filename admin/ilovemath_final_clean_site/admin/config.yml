backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: simple
site_url: https://ilovemath.live
logo_url: /favicon.ico
media_folder: "../assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "worksheets"
    label: "Worksheets"
    label_singular: "Worksheet"
    folder: "../content/worksheets"
    create: true
    slug: "lesson-{{lesson_number}}-{{slug}}"
    summary: "Lesson {{lesson_number}} - {{title}}"
    fields:
      - { label: "Lesson Number", name: "lesson_number", widget: "number", value_type: "int", min: 1 }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Worksheet PDF", name: "pdf", widget: "file" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    folder: "../content/videos"
    create: true
    slug: "lesson-{{lesson_number}}-{{slug}}"
    summary: "Lesson {{lesson_number}} - {{title}}"
    fields:
      - { label: "Lesson Number", name: "lesson_number", widget: "number", value_type: "int", min: 1 }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Video URL", name: "video_url", widget: "string" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "../content/settings/homepage.md"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "CTA Text", name: "cta_text", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "markdown", required: false }
      - label: "Site Settings"
        name: "site_settings"
        file: "../content/settings/site.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string", required: false }
          - { label: "Footer Text", name: "footer_text", widget: "string", required: false }
